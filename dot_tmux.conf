# Truecolor + correct terminal type (works on Linux and macOS)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-kitty:Tc,xterm-ghostty:Tc"

# Snappier escape handling for vim/nvim, larger scrollback
set -sg escape-time 10
set -g history-limit 50000
set -g focus-events on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# I prefer to rename all windows myself with [<leader> ,]
set -g allow-rename off

set -g mouse on
unbind r
bind r source-file ~/.tmux.conf

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @dracula-show-powerline true
set -g @dracula-fixed-location "SLC"
set -g @dracula-plugins "weather"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g status-position top

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
